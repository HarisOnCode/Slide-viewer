<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Section Opener - Roman Era</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Montserrat:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 900px;
            overflow-y: auto;
            overflow-x: hidden;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        .slide-container {
            width: 1280px;
            height: 900px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.6) contrast(1.1);
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 6rem;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .era-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }

        .era-number::before {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background-color: #fff;
            margin-right: 1.5rem;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            line-height: 0.9;
            color: #ffffff;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .description-box {
            max-width: 600px;
            border-left: 4px solid #ffffff;
            padding-left: 2rem;
        }

        .description-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.4;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }

        .sub-details {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.05em;
        }

        .date-badge {
            position: absolute;
            top: 4rem;
            right: 4rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 1rem 2rem;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
            text-transform: uppercase;
            z-index: 10;
        }

        .vertical-deco-text {
            position: absolute;
            right: 4rem;
            bottom: 4rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.6);
            transform: rotate(-90deg);
            transform-origin: bottom right;
            text-transform: uppercase;
            z-index: 10;
        }

        .image-credit {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: sans-serif;
            z-index: 5;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Hero Image -->
<img alt="Pompeii Fresco" class="hero-image" src="https://page.gensparksite.com/slides_images/9d75161d0aebbd8ee3731cd472613f09.webp"/>
<!-- Content Overlay -->
<div class="content-overlay">
<div class="era-number">
<p>Era 04</p>
</div>
<h1 class="main-title">
<p>Roman<br/>Era</p>
</h1>
<div class="description-box">
<p class="description-text">Design defined by empire, spectacle, and engineering. A triumph of structure
                    and power.</p>
<p class="sub-details">Influence: Concrete, Arches, Mosaics, Frescoes</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="date-badge">
<p>753 BCE – 476 CE</p>
</div>
<div class="vertical-deco-text">
<p>Grandeur of Rome</p>
</div>
<div class="image-credit">
<p>Image: Menander fresco Pompeii | Source: Wikimedia Commons</p>
</div>
</div>
</body>
</html>
