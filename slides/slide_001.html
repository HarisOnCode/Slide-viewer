<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>History of Design - Cover Slide</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 900px;
            overflow-y: auto;
            overflow-x: hidden;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .slide-container {
            width: 1280px;
            height: 900px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            background-color: #f5f5f0;
            display: flex;
            flex-direction: column;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            opacity: 0.9;
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-color: rgba(20, 20, 20, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .border-frame {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 3;
            pointer-events: none;
        }

        .title-typography {
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            line-height: 0.9;
            color: #ffffff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle-typography {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .student-details {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            padding-top: 1.5rem;
            text-align: center;
        }

        .fashion-tag {
            position: absolute;
            bottom: 3.5rem;
            right: 3.5rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.1em;
            z-index: 4;
            transform: rotate(-90deg);
            transform-origin: bottom right;
        }

        .volume-tag {
            position: absolute;
            top: 3.5rem;
            left: 3.5rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #ffffff;
            z-index: 4;
        }
    </style>
</head>
<body>
<div class="slide-container">
<img alt="William Morris Pattern Background" class="hero-image" src="https://page.gensparksite.com/slides_images/38211d5431cb0b2fd7122c256c08d80c.webp"/>
<div class="content-overlay">
<p class="subtitle-typography">Fashion Design Assignment</p>
<h1 class="title-typography">History<br/><span style="font-style: italic; font-weight: 400; font-size: 5.5rem; display: block; margin-top: -0.5rem;">of</span>Design
            </h1>
<div class="student-details">
<p>Created by <strong>Simal Khan FT49</strong></p>
<p style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.8;">A Visual Journey from Stone Age to Art
                    Deco</p>
</div>
</div>
<div class="border-frame"></div>
</div>
</body>
</html>
