<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <title>Slide Viewer</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }

        .section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 1480px;
        }

        /* centered container */
        .slider-container {
            width: 1280px;
            height: 900px;
        }

        /* swiper slider */
        .swiper {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        /* iframe slides */
        .swiper-slide iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* CUSTOM NAV BUTTONS */

        .swiper-button-next,
        .swiper-button-prev {

            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            position: absolute;
            top: 50%;
            transform: translateY(-50%);

            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            transition: 0.2s;

        }

        /* position outside slide */

        .swiper-button-prev {
            left: 0px;
        }

        .swiper-button-next {
            right: 0px;
        }

        /* arrow style */

        .swiper-button-next::after,
        .swiper-button-prev::after {
            font-size: 22px;
            color: white;
            font-weight: bold;
        }

        /* hover */

        .swiper-button-next:hover,
        .swiper-button-prev:hover {
            transform: translateY(-50%) scale(1.1);
        }
    </style>

</head>

<body>
    <section class="section">

        <div class="slider-container">

            <div class="swiper">

                <div class="swiper-wrapper" id="slidesContainer"></div>

            </div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>

        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

    <script>

        /* create slides automatically */

        const container = document.getElementById("slidesContainer");

        for (let i = 1; i <= 140; i++) {

            const num = String(i).padStart(3, '0');

            const slide = document.createElement("div");
            slide.className = "swiper-slide";

            slide.innerHTML = `
<iframe src="slides/slide_${num}.html"></iframe>
`;

            container.appendChild(slide);

        }

        /* initialize swiper */

        new Swiper(".swiper", {

            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev"
            },

            keyboard: {
                enabled: true
            },

        });

    </script>

</body>

</html>
